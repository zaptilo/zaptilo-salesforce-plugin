<template>
    <div class="slds-p-around_medium" style="min-height: 320px;">
        <div class="slds-text-heading_small slds-m-bottom_small">Zaptilo • Send WhatsApp</div>

        <template if:true={loading}>
            <div class="slds-p-vertical_medium slds-align_absolute-center">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>

        <template if:false={loading}>
            <template if:true={errorMessage}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error slds-m-bottom_small" role="alert">
                    {errorMessage}
                </div>
            </template>

            <template if:true={context}>
                <p class="slds-text-body_regular slds-m-bottom_small">
                    Sending to <strong>{context.name}</strong>
                    <template if:true={context.phone}>
                        &nbsp;at <code>{context.phone}</code>
                    </template>
                </p>

                <template if:true={optedOutMessage}>
                    <div class="slds-notify slds-notify_alert slds-theme_warning slds-m-bottom_small" role="alert">
                        {optedOutMessage}
                    </div>
                </template>

                <lightning-combobox
                    name="template"
                    label="Template"
                    value={selectedTemplate}
                    placeholder="Select a template"
                    options={templateOptions}
                    onchange={handleTemplateChange}
                    required
                ></lightning-combobox>

                <template if:true={hasVariableInputs}>
                    <div class="slds-m-top_small">
                        <template for:each={variableInputs} for:item="v">
                            <lightning-input
                                key={v.key}
                                type="text"
                                label={v.label}
                                data-index={v.index}
                                onchange={handleVariableChange}
                                placeholder="Required by template"
                            ></lightning-input>
                        </template>
                    </div>
                </template>

                <template if:true={hasNoVariableInputs}>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_small">
                        This template has no variables.
                    </p>
                </template>

                <template if:true={templatePreview}>
                    <div class="slds-box slds-box_x-small slds-m-top_small slds-theme_shade">
                        <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_x-small">Preview</div>
                        <div class="slds-text-body_regular">{templatePreview}</div>
                    </div>
                </template>
            </template>

            <div class="slds-m-top_medium slds-text-align_right">
                <lightning-button label="Cancel" onclick={handleClose} class="slds-m-right_x-small"></lightning-button>
                <lightning-button label={sendButtonLabel} variant="brand" onclick={handleSend} disabled={sendDisabled}></lightning-button>
            </div>
        </template>
    </div>
</template>
